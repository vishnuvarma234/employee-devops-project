{% extends "layout.html" %}

{% block content %}

<div class="container mt-5" style="max-width:450px;">

    <div class="card shadow">

        <div class="card-header text-center bg-primary text-white">
            <h3>Employee Management Login</h3>
        </div>

        <div class="card-body">

            {% if error %}
            <div class="alert alert-danger">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST">

                <div class="mb-3">
                    <label>Username</label>
                    <input
                        type="text"
                        class="form-control"
                        name="username"
                        required>
                </div>

                <div class="mb-3">
                    <label>Password</label>
                    <input
                        type="password"
                        class="form-control"
                        name="password"
                        required>
                </div>

                <button class="btn btn-primary w-100">
                    Login
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
