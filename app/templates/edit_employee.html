{% extends "layout.html" %}

{% block content %}

<div class="container mt-4">

    <h2>Edit Employee</h2>

    <form method="POST">

        <div class="mb-3">
            <label>Name</label>
            <input
                type="text"
                class="form-control"
                name="name"
                value="{{ employee.name }}"
                required>
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input
                type="email"
                class="form-control"
                name="email"
                value="{{ employee.email }}"
                required>
        </div>

        <div class="mb-3">
            <label>Department</label>
            <input
                type="text"
                class="form-control"
                name="department"
                value="{{ employee.department }}"
                required>
        </div>

        <div class="mb-3">
            <label>Position</label>
            <input
                type="text"
                class="form-control"
                name="position"
                value="{{ employee.position }}"
                required>
        </div>

        <button class="btn btn-primary">
            Update Employee
        </button>

        <a href="/dashboard" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
